<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diva ai — She's Almost Ready</title>
  <meta name="description" content="DIVA AI is the revolutionary retail intelligence platform. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Open+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111118;
      color: #fff;
      font-family: 'Open Sans', sans-serif;
      overflow: hidden;
    }

    .teaser {
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.2s ease 0.3s forwards;
    }

    .teaser-logo {
      margin-bottom: 2.5rem;
    }

    .teaser-logo img {
      height: 80px;
      width: auto;
    }

    /* WHY: Text fallback in case logo image hasn't been added yet */
    .teaser-logo-text {
      font-family: 'Pacifico', cursive;
      font-size: clamp(3rem, 8vw, 5rem);
      color: #fff;
    }
    .teaser-logo-text .ai {
      font-family: 'Open Sans', sans-serif;
      font-weight: 300;
      font-size: 0.45em;
      vertical-align: super;
      margin-left: 0.1em;
      color: rgba(255,255,255,0.5);
    }

    .teaser-quip {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-style: italic;
      color: #fee759;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }

    /* WHY: Subtle animated glow behind the logo — just enough to feel alive */
    .glow {
      position: fixed;
      top: 50%; left: 50%;
      width: 500px; height: 500px;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        circle,
        rgba(128,0,215,0.12) 0%,
        rgba(24,78,221,0.06) 40%,
        transparent 70%
      );
      z-index: -1;
      animation: pulse 4s ease-in-out infinite alternate;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div class="teaser">
    <div class="teaser-logo">
      <img src="assets/diva-white-lockup.png" alt="diva ai"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div class="teaser-logo-text" style="display:none">diva<span class="ai">ai</span></div>
    </div>
    <p class="teaser-quip">Currently in makeup. A diva never rushes her entrance.</p>
  </div>
</body>
</html>
